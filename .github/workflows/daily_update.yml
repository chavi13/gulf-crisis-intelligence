name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file
        run: |
          echo "EIA_API_KEY=${{ secrets.EIA_API_KEY }}" >> .env
          echo "GIE_API_KEY=${{ secrets.GIE_API_KEY }}" >> .env
          echo "AISSTREAM_API_KEY=${{ secrets.AISSTREAM_API_KEY }}" >> .env

      - name: Run ingestion pipeline
        run: python $GITHUB_WORKSPACE/run_all.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/gulf_data.db
          git diff --staged --quiet || git commit -m "data update $(date +%Y-%m-%d)"
          git push
